<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maharashtra Power Predictions</title>

  <style>
    body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  margin: 0;
  padding: 20px;
  color: white;
}

h1 {
  text-align: center;
  color: #e0f7ff;
  letter-spacing: 1px;
}

/* Grid */
#container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

/* Glass Card */
.card {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 15px;
  padding: 20px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  transition: 0.3s ease;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 12px 40px rgba(0, 123, 255, 0.4);
}

/* Text */
.plant {
  font-size: 16px;
  font-weight: bold;
  color: #cceeff;
}

.value {
  margin-top: 10px;
  font-size: 18px;
  color: #4dd0ff;
}

/* Status */
.loading {
  text-align: center;
  font-size: 18px;
  color: #b0c4de;
}

/* Button */
.refresh {
  display: block;
  margin: 20px auto;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-size: 15px;
  color: white;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  box-shadow: 0 4px 15px rgba(0, 114, 255, 0.5);
  transition: 0.3s ease;
}

.refresh:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 25px rgba(0, 114, 255, 0.8);
}
  </style>
</head>
<body>

  <h1>⚡ Maharashtra Power Plant Predictions</h1>

  <button class="refresh" onclick="loadData()">🔄 Refresh</button>

  <div id="status" class="loading">Loading data...</div>
  <div id="container"></div>

  <script>
    async function loadData() {
      const container = document.getElementById("container");
      const status = document.getElementById("status");

      container.innerHTML = "";
      status.innerText = "Loading data...";

      try {
        const res = await fetch("http://127.0.0.1:8000/predict-all");
        const data = await res.json();

        status.innerText = "";

        if (Object.keys(data).length === 0) {
          status.innerText = "No data available";
          return;
        }

        for (const plant in data) {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <div class="plant">${plant}</div>
            <div class="value">Predicted: ${data[plant]} MW</div>
          `;

          container.appendChild(card);
        }

      } catch (err) {
        console.error(err);
        status.innerText = "❌ Failed to load data. Is backend running?";
      }
    }

    // Load on page start
    loadData();
  </script>

</body>
</html>
