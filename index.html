<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    padding: 25px;
    color: #e6f7ff;
}

/* Container */
.container {
    max-width: 1400px;
    margin: auto;
}

/* Header */
header {
    text-align: center;
    padding: 20px 0;
}

header h1 {
    font-size: 2.5rem;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    -webkit-background-clip: text;
    color: transparent;
}

header p {
    opacity: 0.8;
    margin-top: 5px;
}

/* Button */
.nav-btn {
    display: block;
    margin: 25px auto;
    padding: 12px 28px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(0, 114, 255, 0.5);
    transition: 0.3s ease;
}

.nav-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(0, 114, 255, 0.8);
}

/* Date */
#reportDate {
    text-align: center;
    color: #b0c4de;
    margin-bottom: 25px;
}

/* Sector Container */
.sector-container {
    display: grid;
    gap: 25px;
}

/* Glass Card */
.sector-card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 20px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 10px 35px rgba(0, 0, 0, 0.3);
    transition: 0.3s ease;
}

.sector-card:hover {
    transform: translateY(-6px);
}

/* Header inside card */
.sector-header h1 {
    color: #cceeff;
}

.stats {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    margin-top: 10px;
    font-size: 20px;
    color: #d6f1ff;
}

/* Layout */
.sector-content {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 20px;
    margin-top: 15px;
}

/* Chart */
.chart-box {
    width: 220px;
    height: 220px;
}

/* Type grid */
.types-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
}

/* Small glass cards */
.type-card {
    background: rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 12px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(8px);
    transition: 0.2s;
}

.type-card:hover {
    transform: scale(1.03);
}

.type-card h2 {
    font-size: 25px;
    color: #bfe9ff;
    margin-bottom: 5px;
}

.type-card p {
    font-size: 20px;
    color: #d6f1ff;
}

/* Responsive fix (IMPORTANT: prevents horizontal scroll) */
@media (max-width: 900px) {
    .sector-content {
        grid-template-columns: 1fr;
    }

    .chart-box {
        margin: auto;
    }
}

@media (max-width: 500px) {
    body {
        padding: 15px;
    }

    .chart-box {
        width: 180px;
        height: 180px;
    }
}
  </style>
</head>
<body>

<div class="container">
<header>
  <h1>Maharashtra Energy Grid Dashboard</h1>
  <p>Real-time monitoring and predictive analytics</p>
</header>

<!-- NEW BUTTON -->
<button class="nav-btn" onclick="goToPrediction()">
  Predict Production of Next Day
</button>

<p id="reportDate"></p>
<div id="sectors" class="sector-container"></div>
</div>

<script>
const sectorNames = ["STATE SECTOR", "PVT SECTOR", "CENTRAL SECTOR"];

function goToPrediction() {
  window.location.href = "predict_all.html"; // change if needed
}

fetch("http://localhost:8000")
  .then(res => res.json())
  .then(data => {

    const dateObj = data.find(d => d.date);
    if(dateObj){
      document.getElementById("reportDate").innerText = "Report Date: " + dateObj.date;
    }

    renderSectors(data);
  })
  .catch(err => {
    document.body.insertAdjacentHTML("afterbegin",
      `<p style=\"color:red;text-align:center;font-weight:bold\">Failed to load dashboard data.</p>`);
    console.error(err);
  });

function formatNum(val){
  const num = Number(val);
  if(isNaN(num)) return val;
  return num.toFixed(2); // limit to 2 decimal places
}

function renderSectors(data){
  const container = document.getElementById("sectors");
  let currentSector = null;

  data.forEach(item => {

    if(sectorNames.includes(item.Type)){
      currentSector = document.createElement("div");
      currentSector.className = "sector-card";

      currentSector.innerHTML = `
        <div class="sector-header">
          <h2>${item.Type}</h2>
          <div class="stats">
            <span>⚡ Capacity: ${formatNum(item.Capacity)}</span>
            <span>✅ Production: ${formatNum(item.Production)}</span>
            <span>📈 Expected: ${formatNum(item.Expected)}</span>
            <span>❌ Unavailable: ${formatNum(item["Unavailable Capacity"])}</span>
          </div>
        </div>
        <div class="sector-content">
            <div class="chart-box">
                <canvas></canvas>
            </div>
            <div class="types-grid"></div>
        </div>
      `;

      container.appendChild(currentSector);
      createPieChart(currentSector.querySelector("canvas"), item);
    }

    else if(currentSector && item.Type){
      const typesGrid = currentSector.querySelector(".types-grid");

      const typeCard = document.createElement("div");
      typeCard.className = "type-card";

      typeCard.innerHTML = `
        <h3>${item.Type}</h3>
        <p>Capacity: ${formatNum(item.Capacity)}</p>
        <p>Production: ${formatNum(item.Production)}</p>
        <p>Expected: ${formatNum(item.Expected)}</p>
        <p>Unavailable: ${formatNum(item["Unavailable Capacity"])}</p>
      `;

      typesGrid.appendChild(typeCard);
    }

  });
}

function createPieChart(canvas, sector){
  new Chart(canvas, {
    type: 'pie',
    data: {
      labels: ['Production','Over Estimation'],
      datasets: [{
        data: [
          sector.Production,
          Math.max(sector.Expected - sector.Production, 0)
        ]
      }]
    },
    options: {
  responsive: true,
  maintainAspectRatio: false,

  plugins: {
    legend: {
      labels: {
        color: '#e6f7ff'  // 👈 legend text color
      }
    }
  }
}
  });
}
</script>
</body>
</html>
